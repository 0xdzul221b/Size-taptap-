<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismic Tap-to-Earn</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* নাম ইনপুটের জন্য পপআপ বক্সের স্টাইল */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: #1e1b4b;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #818cf8;
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #4338ca;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .modal-box button {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            color: white; border: none; padding: 12px 25px;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            width: 100%;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color: #818cf8; font-size: 1.3rem;">Welcome Gamer!</h3>
            <p style="color: #94a3b8; font-size: 0.85rem; margin-top: 5px;">Enter your name to start tapping</p>
            <input type="text" id="player-input" placeholder="Your Name..." maxlength="15">
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <div class="game-container">
        <div class="header">
            <h2>⚡ SEISMIC TAP</h2>
            <div id="user-display">Player: <span id="username">Guest</span></div>
        </div>

        <div class="score-section">
            <div id="level-badge" style="background: #a855f7; padding: 5px 14px; border-radius: 12px; display: inline-block; font-size: 0.8rem; font-weight: bold; margin-bottom: 12px; letter-spacing: 1px; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);">
                ⭐ LEVEL 1
            </div>
            <p>Total Balance</p>
            <h1 id="balance">0</h1>
        </div>

        <div class="tap-area">
            <button id="tap-btn">
                <div class="coin">⚡</div>
            </button>
        </div>

        <div id="ai-status" class="ai-box">
            🤖 AI Coach: Welcome! Tap the coin to start earning points.
        </div>

        <div class="energy-section">
            <div class="energy-text">
                <span>Energy</span>
                <span id="energy-val">100/100</span>
            </div>
            <div class="progress-bar">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
